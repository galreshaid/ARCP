<style>
:root{
    --page:#edf3f7;
    --panel:#ffffff;
    --panel-tint:#f7fafc;
    --line:#d7e2ea;
    --line-strong:#bfd0dd;
    --ink:#18324d;
    --muted:#6c8194;
    --brand:#18324d;
    --brand-dark:#0f476b;
    --accent:#de541a;
    --soft:#f6fafc;
    --soft-blue:#edf5ff;
    --ok-bg:#ecfdf5;
    --ok-text:#166534;
    --warn-bg:#fef3c7;
    --warn-text:#92400e;
    --shadow:0 24px 48px rgba(15,49,77,.08);
    --shadow-soft:0 12px 24px rgba(15,49,77,.08);
    --radius-xl:22px;
    --radius-lg:16px;
    --radius-md:12px;
}

body{
    font-family:"Trebuchet MS","Segoe UI",sans-serif;
    background:
        radial-gradient(circle at top right, rgba(20,93,141,.12), transparent 30%),
        radial-gradient(circle at bottom left, rgba(222,84,26,.08), transparent 26%),
        linear-gradient(135deg, #f7fafc, var(--page)) !important;
    color:var(--ink);
}

.app-frame{
    margin-top:0;
}

.app-main .page.system-admin-page{
    width:100% !important;
    max-width:none !important;
    margin:0 !important;
    justify-self:stretch !important;
    display:grid !important;
    gap:16px !important;
}

.container{
    margin-top:16px;
    display:grid;
    gap:16px;
}

.hero{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:16px;
    margin:0 !important;
}

.hero-panel,
.shortcut-panel,
.section,
.panel{
    background:rgba(255,255,255,.96) !important;
    border:1px solid var(--line) !important;
    border-radius:var(--radius-xl) !important;
    box-shadow:var(--shadow) !important;
    backdrop-filter:none !important;
}

.hero-panel{
    padding:20px !important;
    position:relative;
    overflow:hidden;
}

.hero-panel::after{
    display:none !important;
}

.shortcut-panel,
.section,
.panel{
    padding:14px !important;
}

.eyebrow{
    display:inline-flex;
    align-items:center;
    padding:5px 9px;
    border-radius:999px;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    font-weight:700;
    background:var(--soft-blue) !important;
    color:var(--brand) !important;
    margin-bottom:10px;
}

h1{
    margin:0 0 6px;
    font-size:30px;
    line-height:1.08;
    color:var(--ink);
}

.hero-copy,
.subtitle,
.section-head p,
.shortcut-panel p,
.resource-copy,
.panel-copy,
.help,
.page-meta,
.crumbs,
.stat-detail{
    color:var(--muted) !important;
    font-size:12px !important;
    line-height:1.5 !important;
}

.hero-copy{
    max-width:760px;
}

.hero-actions,
.toolbar,
.search,
.pagination,
.actions,
.resource-actions,
.shortcut-list,
.section-grid,
.field-grid{
    gap:12px !important;
}

.hero-actions{
    display:flex;
    align-items:center;
    justify-content:flex-start;
    flex-wrap:wrap;
    margin-top:12px !important;
}

.topbar,
.toolbar,
.pagination{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    flex-wrap:wrap;
}

.panel-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    margin-bottom:12px;
    flex-wrap:wrap;
}

.topbar,
.section-head{
    margin-bottom:12px !important;
}

.section-head h2,
.panel-head h2{
    margin:0 0 2px !important;
    font-size:18px !important;
    line-height:1.2 !important;
    color:var(--ink);
}

.button,
.btn{
    min-height:36px !important;
    padding:0 14px !important;
    border-radius:999px !important;
    border:1px solid transparent !important;
    cursor:pointer;
    font:inherit;
    font-weight:800 !important;
    font-size:12px !important;
    letter-spacing:.01em;
    text-decoration:none !important;
    display:inline-flex !important;
    align-items:center !important;
    justify-content:center !important;
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
    white-space:nowrap;
}

.button:hover,
.btn:hover{
    transform:translateY(-1px);
}

.button-primary,
.btn-primary{
    background:linear-gradient(135deg, var(--brand), var(--brand-dark)) !important;
    border-color:var(--brand) !important;
    color:#fff !important;
    box-shadow:0 12px 24px rgba(20,93,141,.16) !important;
}

.button-secondary,
.btn-secondary{
    background:linear-gradient(180deg, #fff, #f8fbfd) !important;
    border:1px solid var(--line-strong) !important;
    color:var(--brand) !important;
    box-shadow:0 8px 18px rgba(15,49,77,.06) !important;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:12px;
    margin:0 !important;
}

.stat{
    background:linear-gradient(180deg, #ffffff, #f8fbfd) !important;
    border:1px solid #dbe7f2 !important;
    border-radius:var(--radius-lg) !important;
    padding:12px 14px !important;
    box-shadow:var(--shadow-soft) !important;
    position:relative;
}

.stat::before{
    content:"";
    position:absolute;
    top:0;
    left:14px;
    right:14px;
    height:2px;
    border-radius:999px;
    background:linear-gradient(90deg, rgba(20,93,141,.9), rgba(20,93,141,.15));
}

.stat-label{
    margin:0 0 8px !important;
    font-size:11px !important;
    color:var(--muted) !important;
    text-transform:uppercase;
    letter-spacing:.06em;
    font-weight:700;
}

.stat-value{
    margin:0;
    font-size:28px !important;
    line-height:1 !important;
    font-weight:800;
    color:var(--brand-dark);
}

.crumbs{
    display:inline-flex;
    align-items:center;
    gap:8px;
}

.crumbs a,
.link,
.resource-actions a{
    color:var(--brand);
    font-size:12px;
    font-weight:700;
    text-decoration:none;
}

.resource-actions a:last-child{
    color:var(--accent);
}

input[type="search"],
input,
select,
textarea{
    width:100%;
    min-height:40px;
    padding:0 12px;
    border-radius:12px;
    border:1px solid var(--line-strong);
    background:#fbfdff;
    font:inherit;
    font-size:14px;
    color:var(--ink);
}

textarea{
    min-height:120px;
    padding:10px 12px;
}

select[multiple]{
    min-height:180px;
    padding:10px 12px;
}

input[type="checkbox"]{
    width:auto;
    min-height:auto;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border-color:#8eb6d3;
    box-shadow:0 0 0 3px rgba(20,93,141,.08);
}

label{
    font-size:11px;
    color:var(--muted);
    font-weight:800;
    letter-spacing:.05em;
    text-transform:uppercase;
}

.field{
    display:grid;
    gap:6px;
}

.field-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
}

.checkbox-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    min-height:40px;
    padding:0 12px;
    border:1px solid var(--line-strong);
    border-radius:12px;
    background:#fbfdff;
}

.messages{
    display:grid;
    gap:10px;
    margin-bottom:12px;
}

.message,
.error-note,
.errorlist{
    margin:0 0 12px;
    padding:12px;
    border-radius:12px;
    font-size:12px;
    line-height:1.5;
    list-style:none;
}

.message{
    background:var(--soft-blue);
    color:var(--brand-dark);
    font-weight:700;
}

.error-note,
.errorlist{
    background:rgba(222,84,26,.08);
    color:#9b3c11;
}

.table-wrap{
    overflow:auto;
    border:1px solid #dde7ef;
    border-radius:18px;
    background:linear-gradient(180deg, #fff, var(--panel-tint));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.65);
}

table{
    width:100%;
    min-width:960px;
    border-collapse:collapse;
    background:#fff;
}

th,
td{
    padding:12px;
    border-bottom:1px solid #edf2f7;
    text-align:left;
    vertical-align:top;
}

th{
    background:#f8fbfd;
    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.05em;
}

td{
    font-size:13px;
    line-height:1.4;
}

tbody tr:nth-child(even){
    background:#fbfdff;
}

tbody tr:hover{
    background:#f4f9fc;
}

.record-count,
.count-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:28px;
    min-width:28px;
    padding:0 10px;
    border-radius:999px;
    background:var(--soft-blue);
    color:var(--brand-dark);
    font-size:11px;
    font-weight:800;
}

.resource-card{
    display:grid;
    gap:12px;
    padding:14px;
    border-radius:var(--radius-lg);
    border:1px solid #dbe7f2;
    background:linear-gradient(180deg, #ffffff, #f7fbff);
}

.resource-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
}

.resource-title{
    margin:0 0 4px;
    font-size:16px;
    line-height:1.3;
}

.shortcut-link{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:12px 14px;
    border-radius:var(--radius-md);
    border:1px solid #dbe7f2;
    background:linear-gradient(180deg, #ffffff, #f7fbff);
    color:var(--ink);
    text-decoration:none;
    font-size:13px;
    font-weight:700;
}

.shortcut-link span{
    color:var(--muted);
    font-size:11px;
    font-weight:600;
}

.empty,
.center{
    padding:40px;
    text-align:center;
    color:var(--muted);
    font-size:13px;
}

@media (max-width:1100px){
    .hero{
        grid-template-columns:1fr;
    }

    th,
    td{
        padding:10px;
    }

    .toolbar,
    .pagination,
    .actions{
        align-items:stretch;
    }
}
</style>
