<style>
    :root {
        --aaml-blue: #0A4986;
        --aaml-blue-deep: #005183;
        --aaml-blue-dark: #0A2B42;
        --aaml-blue-muted: #1F4C86;
        --aaml-blue-soft: #C8D7E9;
        --aaml-orange: #DD5B0B;
        --aaml-orange-strong: #D2541A;
        --aaml-white: #FFFFFF;
        --aaml-ink: #1C1C1B;
        --aaml-slate: #5B5B5F;
        --aaml-surface: #F3F4F7;
        --aaml-line: #DCE6F0;
        --aaml-line-strong: #C9D8E6;
        --aaml-shadow: 0 18px 40px rgba(10, 43, 66, 0.1);
        --aaml-content-gap: 16px;
        --aaml-panel-radius: 22px;
        --aaml-panel-shadow: 0 24px 48px rgba(15, 49, 77, 0.08);
    }

    body {
        background:
            radial-gradient(circle at top right, rgba(20, 93, 141, 0.12), transparent 30%),
            radial-gradient(circle at bottom left, rgba(222, 84, 26, 0.08), transparent 26%),
            linear-gradient(135deg, #f7fafc, var(--aaml-surface)) !important;
        font-family: "Segoe UI Variable", "Segoe UI", Tahoma, sans-serif !important;
        color: var(--aaml-ink) !important;
    }

    [hidden] {
        display: none !important;
    }

    .app-header {
        position: sticky;
        top: 0;
        z-index: 50;
        width: min(1880px, calc(100% - 24px));
        margin: 12px auto 0;
        min-height: 56px;
        padding: 0 14px;
        border-radius: 18px 18px 0 0;
        background: var(--aaml-blue-dark);
        border-bottom: 3px solid var(--aaml-orange);
        box-shadow: 0 2px 10px rgba(10, 43, 66, 0.2);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        color: var(--aaml-white);
    }

    .app-header-left {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
    }

    .app-header-toggle {
        display: inline-grid;
        gap: 4px;
        align-content: center;
        justify-items: stretch;
        width: 34px;
        height: 34px;
        padding: 8px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        cursor: pointer;
    }

    .app-header-toggle:hover {
        background: rgba(255, 255, 255, 0.08);
    }

    .app-header-toggle span {
        display: block;
        height: 2px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.94);
    }

    .app-header-title-block {
        min-width: 0;
    }

    .app-header-title {
        margin: 0;
        font-size: 17px;
        line-height: 1.2;
        font-weight: 800;
        color: var(--aaml-white);
    }

    .app-header-subtitle {
        margin: 2px 0 0;
        font-size: 11px;
        line-height: 1.45;
        color: rgba(255, 255, 255, 0.72);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .app-header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .app-user-chip {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.08);
        color: var(--aaml-white);
        font-size: 12px;
        font-weight: 700;
    }

    .app-header-action-form {
        margin: 0;
    }

    .app-header-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid var(--aaml-orange);
        background: linear-gradient(135deg, var(--aaml-orange), var(--aaml-orange-strong));
        color: var(--aaml-white);
        font-size: 12px;
        font-weight: 700;
        font-family: inherit;
        text-decoration: none;
        cursor: pointer;
        box-shadow: 0 10px 18px rgba(221, 91, 11, 0.2);
    }

    .app-header-inbox-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.08);
        color: var(--aaml-white);
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        list-style: none;
    }

    .app-header-inbox-link:hover {
        background: rgba(255, 255, 255, 0.12);
    }

    .app-header-inbox-link::-webkit-details-marker {
        display: none;
    }

    .app-header-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
        border-radius: 999px;
        background: var(--aaml-orange);
        color: var(--aaml-white);
        font-size: 10px;
        font-weight: 800;
        line-height: 1;
    }

    .app-header-inbox-menu {
        position: relative;
    }

    .app-header-inbox-menu[open] .app-header-inbox-link {
        background: rgba(255, 255, 255, 0.14);
    }

    .app-header-inbox-panel {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        width: min(420px, calc(100vw - 40px));
        max-height: min(70vh, 560px);
        overflow: auto;
        padding: 14px;
        border-radius: 16px;
        border: 1px solid var(--aaml-line);
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 20px 40px rgba(10, 43, 66, 0.22);
        color: var(--aaml-ink);
        z-index: 90;
    }

    .app-header-inbox-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--aaml-line);
    }

    .app-header-inbox-head strong {
        display: block;
        font-size: 14px;
        line-height: 1.35;
        color: #18324d;
    }

    .app-header-inbox-head small {
        display: block;
        margin-top: 2px;
        font-size: 11px;
        line-height: 1.45;
        color: #6c8194;
    }

    .app-header-inbox-list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
    }

    .app-header-inbox-compose {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #dbe7f2;
        background: #f8fbfd;
    }

    .app-header-compose-form {
        display: grid;
        gap: 8px;
    }

    .app-header-compose-label {
        font-size: 11px;
        line-height: 1.4;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #6c8194;
    }

    .app-header-compose-select,
    .app-header-compose-input,
    .app-header-compose-textarea {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #bfd0dd;
        background: #ffffff;
        color: #18324d;
        font-family: inherit;
        font-size: 12px;
    }

    .app-header-compose-select,
    .app-header-compose-input {
        min-height: 34px;
        padding: 0 10px;
    }

    .app-header-compose-textarea {
        min-height: 74px;
        padding: 8px 10px;
        resize: vertical;
    }

    .app-header-inbox-item {
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #dbe7f2;
        background: linear-gradient(180deg, #ffffff, #f8fbfd);
    }

    .app-header-inbox-item.unread {
        border-color: #bfd0dd;
        background: linear-gradient(180deg, #ffffff, #f4f9fc);
    }

    .app-header-inbox-item-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
    }

    .app-header-inbox-item-head strong {
        display: block;
        font-size: 13px;
        line-height: 1.4;
        color: #18324d;
    }

    .app-header-inbox-item-head span {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 0 8px;
        border-radius: 999px;
        background: #edf5ff;
        color: #0f476b;
        font-size: 10px;
        font-weight: 800;
        white-space: nowrap;
    }

    .app-header-inbox-meta {
        margin-top: 6px;
        font-size: 11px;
        line-height: 1.45;
        color: #6c8194;
    }

    .app-header-inbox-message {
        margin-top: 8px;
        font-size: 12px;
        line-height: 1.55;
        color: #314b64;
    }

    .app-header-inbox-item-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
    }

    .app-header-inline-form {
        margin: 0;
    }

    .app-header-inline-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 30px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid #bfd0dd;
        background: linear-gradient(180deg, #ffffff, #f8fbfd);
        color: #18324d;
        font-family: inherit;
        font-size: 11px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
    }

    .app-header-inline-button.primary {
        background: linear-gradient(135deg, #18324d, #0f476b);
        border-color: #18324d;
        color: #ffffff;
    }

    .app-header-inbox-empty {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: #f8fbfd;
        border: 1px solid #dbe7f2;
        color: #6c8194;
        font-size: 12px;
        line-height: 1.55;
    }

    .app-frame {
        width: min(1880px, calc(100% - 24px));
        margin: 0 auto 24px;
        display: grid;
        grid-template-areas: "sidebar main";
        grid-template-columns: 240px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
        transition: grid-template-columns 0.24s ease;
    }

    .app-frame > .app-sidebar {
        grid-area: sidebar;
    }

    .app-frame > .app-main {
        grid-area: main;
    }

    .app-frame > :not(.app-sidebar):not(.app-main) {
        grid-column: 1 / -1;
    }

    .app-main {
        min-width: 0;
        width: 100%;
        display: grid;
        gap: var(--aaml-content-gap);
        align-content: start;
        align-self: start;
        min-height: 0;
        justify-items: stretch;
    }

    .app-main > .review-shell {
        width: 100%;
        max-width: none;
        margin: 0;
        align-self: start;
        min-height: 0;
    }

    .app-main .page {
        width: 100% !important;
        max-width: none !important;
        margin: 0 !important;
        display: grid !important;
        gap: var(--aaml-content-gap) !important;
    }

    .app-main .layout {
        width: 100% !important;
        max-width: none !important;
        margin: 0 !important;
    }

    .app-main .header-top {
        max-width: none !important;
        margin: 0 !important;
    }

    .app-main .container {
        margin-top: 0 !important;
        display: grid !important;
        gap: var(--aaml-content-gap) !important;
    }

    .app-main .hero,
    .app-main .header {
        margin: 0 !important;
        padding: 24px 28px !important;
        border: 1px solid var(--aaml-line) !important;
        border-bottom: 1px solid var(--aaml-line) !important;
        border-radius: var(--aaml-panel-radius) !important;
        background: rgba(255, 255, 255, 0.94) !important;
        color: #18324d !important;
        box-shadow: var(--aaml-panel-shadow) !important;
        display: grid !important;
        gap: var(--aaml-content-gap) !important;
    }

    .app-main .hero p,
    .app-main .header p,
    .app-main .hero-copy,
    .app-main .header-copy {
        color: #6c8194 !important;
    }

    .app-main .hero h1,
    .app-main .header h1 {
        margin: 0 !important;
        font-size: clamp(28px, 3vw, 34px) !important;
        line-height: 1.1 !important;
        color: #18324d !important;
    }

    .app-main .eyebrow {
        background: #edf5ff !important;
        color: var(--aaml-blue) !important;
    }

    .app-main .meta-chip {
        background: #f1f7fb !important;
        border: 1px solid #d6e7f4 !important;
        color: var(--aaml-blue) !important;
    }

    .app-main .meta-chip strong {
        color: var(--aaml-blue) !important;
    }

    .app-main .hero-panel,
    .app-main .shortcut-panel,
    .app-main .section,
    .app-main .panel,
    .app-main .card,
    .app-main .exam-card,
    .app-main .protocols-section,
    .app-main .metric,
    .app-main .stat {
        background: rgba(255, 255, 255, 0.94) !important;
        border: 1px solid #d7e2ea !important;
        border-radius: var(--aaml-panel-radius) !important;
        box-shadow: var(--aaml-panel-shadow) !important;
        backdrop-filter: none !important;
    }

    .app-main .hero-panel,
    .app-main .shortcut-panel {
        background: rgba(255, 255, 255, 0.94) !important;
        backdrop-filter: none !important;
    }

    .app-main .section,
    .app-main .panel,
    .app-main .card,
    .app-main .exam-card,
    .app-main .protocols-section {
        padding: 18px !important;
    }

    .app-main .metric,
    .app-main .stat {
        padding: 16px 18px !important;
    }

    .app-main .panel-head,
    .app-main .section-head {
        margin-bottom: 14px !important;
    }

    .app-main .panel-head h2,
    .app-main .section-head h2 {
        font-size: 20px !important;
        line-height: 1.2 !important;
    }

    .app-main .panel-copy,
    .app-main .section-copy,
    .app-main .subtitle {
        color: #6c8194 !important;
        font-size: 13px !important;
        line-height: 1.55 !important;
    }

    .app-main .stats,
    .app-main .metrics {
        gap: 14px !important;
    }

    .app-main .stat-label,
    .app-main .metric-label {
        font-size: 12px !important;
        letter-spacing: 0.06em !important;
    }

    .app-main .stat-value,
    .app-main .metric-value {
        font-size: 32px !important;
        line-height: 1 !important;
    }

    .app-main .stat-detail,
    .app-main .metric-detail {
        font-size: 13px !important;
        line-height: 1.5 !important;
    }

    .app-main .hero-actions,
    .app-main .toolbar,
    .app-main .actions,
    .app-main .resource-actions {
        gap: 10px !important;
    }

    .app-main .btn,
    .app-main .button {
        min-height: 40px !important;
        padding: 0 16px !important;
        border-radius: 999px !important;
        font-size: 13px !important;
        font-weight: 700 !important;
        line-height: 1 !important;
        text-decoration: none !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
    }

    .app-main .btn-primary,
    .app-main .button-primary {
        background: linear-gradient(135deg, #18324d, #0f476b) !important;
        border: 1px solid #18324d !important;
        color: #ffffff !important;
        box-shadow: 0 12px 24px rgba(20, 93, 141, 0.16) !important;
    }

    .app-main .btn-secondary,
    .app-main .button-secondary {
        background: linear-gradient(180deg, #ffffff, #f8fbfd) !important;
        border: 1px solid #bfd0dd !important;
        color: #18324d !important;
        box-shadow: 0 8px 18px rgba(15, 49, 77, 0.06) !important;
    }

    .app-main .table-wrap {
        overflow: auto !important;
        border: 1px solid #dde7ef !important;
        border-radius: 18px !important;
        background: linear-gradient(180deg, #ffffff, #f8fbfd) !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65) !important;
    }

    .app-main table {
        width: 100% !important;
        border-collapse: collapse !important;
        background: #ffffff !important;
    }

    .app-main th,
    .app-main td {
        padding: 12px !important;
        border-bottom: 1px solid #edf2f7 !important;
        text-align: left !important;
        vertical-align: top !important;
    }

    .app-main th {
        background: #f8fbfd !important;
        color: #6c8194 !important;
        font-size: 11px !important;
        font-weight: 700 !important;
        line-height: 1.45 !important;
        letter-spacing: 0.05em !important;
        text-transform: uppercase !important;
    }

    .app-main tbody tr:nth-child(even) {
        background: #fbfdff !important;
    }

    .app-main tbody tr:hover {
        background: #f4f9fc !important;
    }

    .app-main input:not([type="checkbox"]):not([type="radio"]),
    .app-main select,
    .app-main textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid #bfd0dd;
        background: #fbfdff;
        color: #18324d;
        font-family: inherit;
        font-size: 14px;
    }

    .app-main input:not([type="checkbox"]):not([type="radio"]),
    .app-main select {
        min-height: 40px;
        padding: 0 12px;
    }

    .app-main textarea {
        min-height: 120px;
        padding: 10px 12px;
        resize: vertical;
    }

    .app-main input:not([type="checkbox"]):not([type="radio"]):focus,
    .app-main select:focus,
    .app-main textarea:focus {
        outline: none;
        border-color: #8eb6d3;
        box-shadow: 0 0 0 3px rgba(20, 93, 141, 0.08);
    }

    .app-main label {
        font-size: 11px;
        line-height: 1.4;
        font-weight: 800;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #6c8194;
    }

    .app-main .badge,
    .app-main .record-count,
    .app-main .count-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        min-width: 28px;
        padding: 0 10px;
        border-radius: 999px;
        background: #edf5ff;
        color: #0f476b;
        font-size: 11px;
        font-weight: 800;
        line-height: 1;
    }

    .app-main .alert,
    .app-main .message,
    .app-main .error-note,
    .app-main .errorlist {
        margin: 0;
        padding: 12px;
        border-radius: 12px;
        font-size: 12px;
        line-height: 1.5;
    }

    .app-main .alert.error,
    .app-main .error-note,
    .app-main .errorlist {
        background: rgba(222, 84, 26, 0.08);
        border: 1px solid rgba(222, 84, 26, 0.2);
        color: #9b3c11;
    }

    .app-main .alert.success,
    .app-main .message {
        background: #edf5ff;
        border: 1px solid #d6e7f4;
        color: #0f476b;
    }


    .app-sidebar {
        position: sticky;
        top: 68px;
        display: grid;
        min-height: calc(100vh - 92px);
        border: 1px solid var(--aaml-line);
        border-top: 0;
        border-radius: 0 0 18px 18px;
        background: var(--aaml-white);
        box-shadow: var(--aaml-shadow);
        overflow: hidden;
        transition: width 0.24s ease;
    }

    .app-brand {
        display: block;
        padding: 14px 12px;
        text-decoration: none;
        background: #ffffff;
        border-bottom: 1px solid var(--aaml-line);
        text-align: center;
    }

    .brand-logo {
        display: block;
        width: min(244px, 100%);
        margin: 0 auto;
        transition: width 0.24s ease;
    }

    .brand-logo img {
        display: block;
        width: 100%;
        height: auto;
    }

    .app-side-user {
        display: grid;
        gap: 4px;
        padding: 12px 16px;
        background: #f7f9fc;
        border-bottom: 1px solid var(--aaml-line);
    }

    .app-side-user strong {
        font-size: 13px;
        line-height: 1.35;
        color: var(--aaml-ink);
    }

    .app-side-user small {
        font-size: 11px;
        line-height: 1.45;
        color: #657688;
    }

    .app-side-menu {
        display: grid;
        gap: 18px;
        padding: 14px 10px;
    }

    .app-side-group {
        display: grid;
        gap: 6px;
    }

    .app-side-group-label {
        margin: 0;
        padding: 0 10px;
        font-size: 11px;
        line-height: 1.4;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #657688;
    }

    .app-nav {
        display: grid;
        gap: 4px;
    }

    .app-nav a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid transparent;
        text-decoration: none;
        color: var(--aaml-ink);
        transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .app-nav-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        min-width: 18px;
        flex: 0 0 18px;
        color: #6d7f91;
        font-size: 14px;
        font-weight: 700;
        line-height: 1;
        transition: color 0.18s ease;
    }

    .app-nav-copy {
        min-width: 0;
    }

    .app-nav a:hover {
        background: #f5f8fc;
        border-color: #edf2f7;
        color: var(--aaml-blue);
    }

    .app-nav a:hover .app-nav-icon {
        color: var(--aaml-blue);
    }

    .app-nav a.active {
        background: #e6edf7;
        border-color: #d7e3f0;
        color: var(--aaml-blue);
    }

    .app-nav a.active .app-nav-icon {
        color: var(--aaml-orange);
    }

    .app-nav strong {
        display: block;
        font-size: 14px;
        line-height: 1.35;
        font-weight: 700;
    }

    .app-nav small {
        display: block;
        margin-top: 1px;
        font-size: 11px;
        line-height: 1.45;
        color: #708192;
    }
